name: Tests

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff (fast)
      run: |
        ruff check adni_classification tests --select E,W,F --ignore E501
      continue-on-error: true

    - name: Run import tests
      run: |
        pytest tests/test_imports.py -v --tb=short

    - name: Run config tests
      run: |
        pytest tests/config/ -v --tb=short

    - name: Generate coverage report
      if: success()
      run: |
        pytest tests/config/ tests/test_imports.py --cov=adni_classification.config --cov=adni_classification --cov=adni_flwr --cov-report=term-missing --tb=short
